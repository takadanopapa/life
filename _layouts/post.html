---
layout: default
---
<article class="wrap post">
  <div class="post-head">
    {% if page.category %}<span class="cat-badge">{{ page.category }}</span>{% endif %}
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-date">{{ page.date | date: '%Y.%m.%d' }}</time>
  </div>

  <div class="post-content">
    {{ content }}
  </div>

  <a class="back-link" href="{{ '/' | relative_url }}">← 一覧へもどる</a>
</article>
