---
layout: default
---
<article class="wrap post">
  <div class="post-head">
    {% if page.category %}<span class="cat-badge">{{ page.category }}</span>{% endif %}
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-date">{{ page.date | date: '%Y.%m.%d' }}</time>
  </div>

  {% if page.affiliate %}
  <p class="affiliate-note"><span class="pr-label">PR</span> この記事には広告・アフィリエイトリンクを含みます。</p>
  {% endif %}

  {% if page.hero %}
  <div class="post-hero" style="--hero: url('{{ page.hero | relative_url }}')">
    <img src="{{ page.hero | relative_url }}" alt="{{ page.shop_name | default: page.title }}">
  </div>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

  <a class="back-link" href="{{ '/' | relative_url }}">← 一覧へもどる</a>
</article>
