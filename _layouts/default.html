<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="cBd1NBV9RH7V15Bfax57-uNq5060D-JLPw5sd5uIiH4" />
  {% seo %}
  {%- comment -%} 検索でのブランド表記ゆれ（タカダノパパ／たかだのパパ 等）を拾わせる構造化データ {%- endcomment -%}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "alternateName": ["タカダノパパ", "たかだのパパ", "タカダノパパの日常blog", "タカダノパパブログ", "高田馬場 パパ ブログ"],
    "url": "{{ '/' | absolute_url }}",
    "inLanguage": "ja",
    "description": {{ site.description | strip_newlines | strip | jsonify }},
    "author": {
      "@type": "Person",
      "name": {{ site.author | jsonify }},
      "jobTitle": "経営コンサルタント",
      "description": "経営コンサルティング会社を経営し、生成AIを活用した業務の自動化・効率化支援を行う"
    }
  }
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {%- feed_meta -%}
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">ホーム</a>
        <a href="{{ '/about/' | relative_url }}">このブログについて</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <nav class="footer-nav">
        <a href="{{ '/' | relative_url }}">ホーム</a>
        <a href="{{ '/about/' | relative_url }}">このブログについて</a>
        <a href="{{ '/contact/' | relative_url }}">お問い合わせ</a>
        <a href="{{ '/privacy/' | relative_url }}">プライバシーポリシー</a>
      </nav>
      <p class="footer-note">本サイトは、Google AdSense 等の広告およびアフィリエイトプログラムを利用しています。</p>
      <p>© {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </div>
  </footer>
</body>
</html>
