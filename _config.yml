# ===== サイト基本設定 =====
title: たかだのパパの日常blog
tagline: 高田馬場のアラフォー2児パパが綴る、ランチ・育児・おでかけの記録
description: >-
  高田馬場に暮らすアラフォー2児の父・フリーランスが、高田馬場周辺のランチ、
  育児で買ってよかったもの、近所の公園や地域のイベント、家族で楽しめる
  アクティビティや旅行、日々の育児のあれこれをまとめる、暮らしと子育ての記録ブログです。
author: たかだのパパ
lang: ja
timezone: Asia/Tokyo

# ===== 公開URL（GitHub Pages 設定後に書き換え）=====
# ユーザーページ（USERNAME.github.io というリポジトリ）の場合:
#   url: "https://USERNAME.github.io"
#   baseurl: ""
# プロジェクトページ（例: takadanobaba-blog というリポジトリ）の場合:
#   url: "https://USERNAME.github.io"
#   baseurl: "/takadanobaba-blog"
url: "https://takadanopapa.com"
baseurl: ""

# ===== テーマ・プラグイン（GitHub Pages 公式サポート分のみ）=====
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

minima:
  skin: auto          # ライト/ダーク自動
  social_links: []

# ===== 投稿の既定値 =====
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false

# ===== ビルド対象外 =====
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - WRITING_GUIDE.md
  - AUTOMATION.md
  - SETUP_GUIDE.md
  - scripts/
  - vendor/
  - .github/
